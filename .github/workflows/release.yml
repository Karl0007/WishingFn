name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Kanata
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force vendor\kanata | Out-Null
          Invoke-WebRequest -Uri "https://github.com/jtroo/kanata/releases/download/v1.11.0/windows-binaries-x64.zip" -OutFile "$env:TEMP\kanata.zip"
          Expand-Archive -Force "$env:TEMP\kanata.zip" "$env:TEMP\kanata"
          $exe = Get-ChildItem "$env:TEMP\kanata" -Recurse -Filter "*.exe" | Where-Object { $_.Name -match "cmd_allowed" -and $_.Name -match "winIOv2" -and $_.Name -match "gui" } | Select-Object -First 1
          if (-not $exe) { throw "Kanata cmd_allowed winIOv2 GUI binary not found" }
          Copy-Item $exe.FullName vendor\kanata\kanata.exe -Force

      - name: Build package
        shell: pwsh
        run: .\scripts\build-windows.ps1 -Version "${{ github.ref_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WishingFn-windows-x64
          path: |
            dist/WishingFn-windows-x64-*.zip
            dist/WishingFn-windows-x64.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" --title "${{ github.ref_name }}" --notes "Automated WishingFn release ${{ github.ref_name }}"
          }
          gh release upload "${{ github.ref_name }}" dist/WishingFn-windows-x64-${{ github.ref_name }}.zip dist/WishingFn-windows-x64.zip --repo "${{ github.repository }}" --clobber

  build-unix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: WishingFn-linux-x64
            kanata: kanata
          - os: macos-13
            asset: WishingFn-macos-x64
            kanata: kanata
          - os: macos-14
            asset: WishingFn-macos-arm64
            kanata: kanata
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Kanata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p vendor/kanata
          case "${{ matrix.asset }}" in
            WishingFn-linux-x64) archive="kanata" ;;
            WishingFn-macos-x64) archive="kanata_macos_cmd_allowed" ;;
            WishingFn-macos-arm64) archive="kanata_macos_arm64_cmd_allowed" ;;
            *) echo "Unsupported asset ${{ matrix.asset }}" >&2; exit 1 ;;
          esac
          # Best-effort placeholder: Kanata asset names may change; replace during platform verification if needed.
          curl -fL "https://github.com/jtroo/kanata/releases/download/v1.11.0/${archive}" -o vendor/kanata/kanata
          chmod +x vendor/kanata/kanata

      - name: Build package
        shell: bash
        run: bash scripts/build-unix.sh "${{ github.ref_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}-*.tar.gz
            dist/${{ matrix.asset }}.tar.gz

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" --title "${{ github.ref_name }}" --notes "Automated WishingFn release ${{ github.ref_name }}"
          gh release upload "${{ github.ref_name }}" dist/${{ matrix.asset }}-${{ github.ref_name }}.tar.gz dist/${{ matrix.asset }}.tar.gz --repo "${{ github.repository }}" --clobber
